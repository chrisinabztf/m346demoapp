# Phase 3: Lokaler Storage (Bilder verschwinden beim Neustart!)
services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=change-me-in-production
      - DB_HOST=db
      - DB_USER=gallery
      - DB_PASS=gallery
      - DB_NAME=gallery
      - STORAGE_MODE=local
      - UPLOAD_FOLDER=/uploads
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    environment:
      - MYSQL_DATABASE=gallery
      - MYSQL_USER=gallery
      - MYSQL_PASSWORD=gallery
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uploads:
  db_data:
